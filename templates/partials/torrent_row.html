<tr id="torrent-{{ torrent.id }}">
    <td><a href="https://rutracker.org/forum/viewtopic.php?t={{ torrent.rutracker_topic_id }}" target="_blank" rel="noopener">{{ torrent.title }}</a></td>
    <td>{{ torrent.quality | default("—") }}</td>
    <td>{% if torrent.size_bytes %}{{ (torrent.size_bytes / 1073741824) | round(1) }} GB{% else %}—{% endif %}</td>
    <td>{{ torrent.seeders | default("—") }}</td>
    <td>
        {% if torrent.qbt_hash %}
        <span>Downloading</span>
        {% else %}
        <button
            hx-post="/api/torrents/{{ torrent.id }}/download"
            hx-target="#torrent-{{ torrent.id }}"
            hx-swap="outerHTML"
            class="outline"
        >Download</button>
        {% endif %}
    </td>
</tr>
