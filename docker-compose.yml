services:
  mview:
    image: ghcr.io/leonqn/mview:latest
    container_name: mview
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - RUST_LOG=mview=debug
    ports:
      - "3000:3000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/data
      - ./mview.db:/app/mview.db
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qbittorrent

  watchtower:
    image: ghcr.io/nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - TZ=Europe/Moscow
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ./qbittorrent-config:/config
      - ./data/downloads:/data/downloads
      - ./qbittorrent.conf:/config/qBittorrent/qBittorrent.conf

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - VERSION=docker
    network_mode: host
    volumes:
      - ./plex-config:/config
      - ./data/media:/data/media
